name: Docker
run-name: Docker image for ${{ github.event.release.tag_name || github.ref_name }}

# Required secrets:
#   DOCKERHUB_USERNAME  - Docker Hub username
#   DOCKERHUB_TOKEN     - Docker Hub access token (not password)

on:
  release:
    # only for newly published releases, not drafts or updates to existing ones
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    # skip pre-releases; workflow_dispatch always runs
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    steps:
      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q '.tagName')
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || steps.release.outputs.tag }}
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/poof
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.tag }}
          flavor: |
            latest=true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/riscv64,linux/386
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
